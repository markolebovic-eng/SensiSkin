<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Facial Layers &amp; Sun Damage</title>
<style>
  html, body { margin: 0; padding: 0; background: #0D1B2A; }
  #sheet { width: 2480px; height: 3508px; display: block; }
  @page { size: 210mm 297mm; margin: 0; }
  @media print {
    html, body { width: 210mm; height: 297mm; }
    #sheet { width: 210mm; height: 297mm; }
  }
</style>
</head>
<body>
<svg id="sheet" viewBox="0 0 2480 3508" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
  <style>
    .ink   { fill:#FAF7F2; font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif; }
    .muted { fill:#9FB0C3; font-family:'Segoe UI',Arial,sans-serif; }
    .heal  { fill:#27AE60; }
    .dmg   { fill:#E74C3C; }
    .gold  { fill:#E0B341; }
    .blue  { fill:#4A90D9; }
    .b { font-weight:800; } .sb { font-weight:600; }
  </style>

  <!-- ===== gradients ===== -->
  <radialGradient id="bg" cx="50%" cy="30%" r="85%">
    <stop offset="0%" stop-color="#16314a"/>
    <stop offset="55%" stop-color="#0D1B2A"/>
    <stop offset="100%" stop-color="#070f18"/>
  </radialGradient>
  <linearGradient id="skinHealthy" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F8D2B4"/>
    <stop offset="55%" stop-color="#F5C5A3"/>
    <stop offset="100%" stop-color="#E6A87E"/>
  </linearGradient>
  <linearGradient id="skinDamaged" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#E3AE7C"/>
    <stop offset="60%" stop-color="#CE9258"/>
    <stop offset="100%" stop-color="#B07539"/>
  </linearGradient>
  <radialGradient id="cheekBlush" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="rgba(231,99,99,.55)"/>
    <stop offset="100%" stop-color="rgba(231,99,99,0)"/>
  </radialGradient>
  <linearGradient id="hairG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4a3340"/>
    <stop offset="100%" stop-color="#2a1c25"/>
  </linearGradient>
  <linearGradient id="dermisBand" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F4ABAB"/>
    <stop offset="100%" stop-color="#E68A8A"/>
  </linearGradient>
  <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="rgba(255,255,255,.30)"/>
    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
  </linearGradient>
  <linearGradient id="panelG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#15293d"/>
    <stop offset="100%" stop-color="#0f1f30"/>
  </linearGradient>

  <!-- ===== TEXTURE PATTERNS ===== -->
  <!-- healthy collagen: ordered dense wavy ivory fibers -->
  <pattern id="collagenHealthy" width="120" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
    <path d="M0,9 q30,-9 60,0 t60,0" fill="none" stroke="#FFF5E4" stroke-width="3" opacity=".85"/>
    <path d="M0,20 q30,9 60,0 t60,0" fill="none" stroke="#F3E2C7" stroke-width="2.4" opacity=".7"/>
    <path d="M0,29 q30,-6 60,0 t60,0" fill="none" stroke="#FFFFFF" stroke-width="1.8" opacity=".5"/>
  </pattern>
  <!-- damaged collagen: short scattered fragmented dull dashes -->
  <pattern id="collagenDamaged" width="120" height="120" patternUnits="userSpaceOnUse">
    <g stroke="#D4B483" stroke-width="4" stroke-linecap="round" opacity=".8">
      <line x1="10" y1="18" x2="38" y2="30"/>
      <line x1="62" y1="12" x2="84" y2="26"/>
      <line x1="20" y1="58" x2="40" y2="50"/>
      <line x1="78" y1="60" x2="104" y2="54"/>
      <line x1="14" y1="92" x2="34" y2="104"/>
      <line x1="60" y1="96" x2="86" y2="88"/>
      <line x1="96" y1="100" x2="116" y2="112"/>
      <line x1="46" y1="78" x2="64" y2="86"/>
    </g>
  </pattern>
  <!-- elastosis: clumped yellow elastic fibers (damaged dermis overlay) -->
  <pattern id="elastosis" width="150" height="150" patternUnits="userSpaceOnUse">
    <g fill="#D8C24A" opacity=".55">
      <path d="M40,40 q20,-18 40,0 q18,22 -4,40 q-26,16 -42,-6 q-12,-20 6,-34 Z"/>
      <path d="M110,100 q16,-12 30,4 q12,18 -8,30 q-22,10 -30,-10 q-6,-16 8,-24 Z"/>
    </g>
  </pattern>
  <!-- melanin healthy: even small brown dots -->
  <pattern id="melaninHealthy" width="62" height="62" patternUnits="userSpaceOnUse">
    <circle cx="31" cy="31" r="5" fill="#7A4A2B" opacity=".8"/>
  </pattern>
  <!-- melanin damaged: clustered, larger uneven dots -->
  <pattern id="melaninDamaged" width="150" height="150" patternUnits="userSpaceOnUse">
    <g fill="#5E3418">
      <circle cx="30" cy="34" r="11"/><circle cx="48" cy="44" r="8"/><circle cx="38" cy="56" r="7"/>
      <circle cx="22" cy="50" r="6"/><circle cx="58" cy="30" r="6"/>
      <circle cx="108" cy="104" r="12"/><circle cx="124" cy="116" r="8"/><circle cx="98" cy="120" r="7"/>
      <circle cx="118" cy="92" r="6"/><circle cx="132" cy="100" r="5"/>
      <circle cx="92" cy="40" r="5"/><circle cx="60" cy="112" r="6"/>
    </g>
  </pattern>
  <!-- fat healthy: plump pale-yellow cells -->
  <pattern id="fatHealthy" width="128" height="128" patternUnits="userSpaceOnUse">
    <g>
      <circle cx="40" cy="40" r="34" fill="#FFF0A0" stroke="#D9C24E" stroke-width="3"/>
      <circle cx="104" cy="96" r="30" fill="#FFF3B0" stroke="#D9C24E" stroke-width="3"/>
      <circle cx="104" cy="30" r="22" fill="#FFEE96" stroke="#D9C24E" stroke-width="2.5"/>
      <circle cx="30" cy="104" r="22" fill="#FFEE96" stroke="#D9C24E" stroke-width="2.5"/>
      <circle cx="30" cy="30" r="9" fill="#fff" opacity=".5"/>
      <circle cx="94" cy="86" r="8" fill="#fff" opacity=".5"/>
    </g>
  </pattern>
  <!-- fat reduced: smaller, collapsed cells -->
  <pattern id="fatDamaged" width="96" height="96" patternUnits="userSpaceOnUse">
    <g>
      <circle cx="28" cy="30" r="18" fill="#E9DC8C" stroke="#BBA742" stroke-width="2.5"/>
      <circle cx="70" cy="64" r="15" fill="#E2D27F" stroke="#BBA742" stroke-width="2.5"/>
      <circle cx="72" cy="24" r="11" fill="#E2D27F" stroke="#BBA742" stroke-width="2"/>
      <circle cx="24" cy="70" r="10" fill="#E2D27F" stroke="#BBA742" stroke-width="2"/>
    </g>
  </pattern>
  <!-- muscle striation -->
  <pattern id="muscle" width="200" height="26" patternUnits="userSpaceOnUse">
    <rect width="200" height="26" fill="#9c2f2c"/>
    <path d="M0,7 q50,-5 100,0 t100,0" stroke="#7a1f1d" stroke-width="3" fill="none"/>
    <path d="M0,18 q50,5 100,0 t100,0" stroke="#b8453f" stroke-width="2.5" fill="none" opacity=".7"/>
  </pattern>
  <!-- healthy stratum: smooth thin layers -->
  <pattern id="stratumHealthy" width="80" height="22" patternUnits="userSpaceOnUse">
    <path d="M0,6 q20,-3 40,0 t40,0" stroke="rgba(120,80,55,.45)" stroke-width="2" fill="none"/>
    <path d="M0,15 q20,3 40,0 t40,0" stroke="rgba(120,80,55,.3)" stroke-width="1.6" fill="none"/>
  </pattern>
  <!-- damaged stratum: cracked thickened -->
  <pattern id="stratumDamaged" width="90" height="40" patternUnits="userSpaceOnUse">
    <g stroke="rgba(90,55,30,.6)" stroke-width="2.4" fill="none">
      <path d="M0,10 q22,-6 45,0 t45,0"/>
      <path d="M0,26 q22,6 45,0 t45,0"/>
      <path d="M22,4 L26,36"/><path d="M64,2 L60,38"/><path d="M44,14 L48,40"/>
    </g>
  </pattern>

  <!-- soft drop shadow -->
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
  </filter>

  <!-- face clip halves -->
  <clipPath id="faceClip">
    <path d="M1180,560 C992,560 852,694 838,952 C826,1166 906,1380 1066,1508 C1132,1562 1180,1582 1180,1582 C1180,1582 1264,1550 1334,1490 C1486,1356 1560,1150 1546,944 C1532,690 1368,560 1180,560 Z"/>
  </clipPath>
  <clipPath id="rightHalf"><rect x="1180" y="500" width="600" height="1200"/></clipPath>
  <clipPath id="leftHalf"><rect x="640" y="500" width="540" height="1200"/></clipPath>
</defs>

<!-- ============ BACKGROUND ============ -->
<rect x="0" y="0" width="2480" height="3508" fill="url(#bg)"/>
<rect x="60" y="60" width="2360" height="3388" rx="40" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="3"/>

<!-- ============ HEADER ============ -->
<text x="1240" y="210" text-anchor="middle" class="ink b" font-size="132" letter-spacing="2">FACIAL LAYERS &amp; SUN DAMAGE</text>
<text x="1240" y="288" text-anchor="middle" class="muted sb" font-size="50">How UV radiation affects each skin layer &amp; how to treat it</text>
<rect x="1010" y="330" width="460" height="6" rx="3" fill="#E0B341"/>

<!-- half banners -->
<g font-size="38" class="b">
  <rect x="548" y="406" width="612" height="78" rx="39" fill="rgba(39,174,96,.16)" stroke="#27AE60" stroke-width="3"/>
  <text x="854" y="457" text-anchor="middle" class="heal">HEALTHY / TREATED SKIN</text>
  <rect x="1200" y="406" width="560" height="78" rx="39" fill="rgba(231,76,60,.16)" stroke="#E74C3C" stroke-width="3"/>
  <text x="1480" y="457" text-anchor="middle" class="dmg">SUN-DAMAGED SKIN</text>
</g>

<!-- ============ FACE ILLUSTRATION ============ -->
<g filter="url(#soft)">
  <!-- hair -->
  <path d="M1180,500 C940,500 770,660 766,940 C760,720 612,1180 720,1500 C620,1120 700,720 838,700 C880,612 1010,556 1180,556 C1350,556 1492,612 1540,704 C1690,732 1764,1140 1660,1520 C1772,1180 1620,716 1600,944 C1596,654 1420,500 1180,500 Z" fill="url(#hairG)"/>
  <!-- neck -->
  <path d="M1060,1500 C1066,1606 1058,1672 1030,1730 L1356,1730 C1326,1672 1316,1604 1322,1500 Z" fill="url(#skinHealthy)"/>
  <path d="M1180,1500 C1180,1604 1186,1672 1200,1730 L1356,1730 C1326,1672 1316,1604 1322,1500 Z" fill="url(#skinDamaged)" opacity=".9"/>

  <!-- base face (healthy gradient over whole), damaged overlay on right -->
  <g clip-path="url(#faceClip)">
    <rect x="700" y="500" width="1000" height="1200" fill="url(#skinHealthy)"/>
    <!-- right half damaged tone -->
    <rect x="1180" y="500" width="520" height="1200" fill="url(#skinDamaged)" opacity=".92"/>
    <!-- right-half sun mottling / pigmentation -->
    <rect x="1180" y="500" width="520" height="1200" fill="url(#melaninDamaged)" opacity=".22"/>
    <!-- cheek blush left (healthy glow) -->
    <ellipse cx="1010" cy="1230" rx="150" ry="100" fill="url(#cheekBlush)"/>
    <!-- soft form shadow -->
    <path d="M1180,560 C1180,900 1180,1300 1180,1582 C1320,1500 1470,1260 1500,980 C1430,1180 1300,1420 1180,1560 Z" fill="rgba(120,70,40,.12)"/>
    <!-- damaged side fine wrinkles -->
    <g stroke="rgba(120,70,40,.5)" stroke-width="3.2" fill="none" stroke-linecap="round" clip-path="url(#rightHalf)">
      <path d="M1300,860 q70,-16 150,2"/>
      <path d="M1310,900 q70,-14 140,4"/>
      <path d="M1430,1010 q40,30 36,80"/>   <!-- crow's feet -->
      <path d="M1452,1006 q44,28 44,84"/>
      <path d="M1300,1240 q70,80 60,200"/>  <!-- nasolabial -->
      <path d="M1250,1380 q60,40 92,120"/>
    </g>
    <!-- a few discrete sun spots right cheek -->
    <g fill="#6E3C1C" opacity=".5">
      <ellipse cx="1380" cy="1180" rx="20" ry="14"/>
      <ellipse cx="1440" cy="1240" rx="14" ry="11"/>
      <ellipse cx="1330" cy="1110" rx="12" ry="9"/>
      <ellipse cx="1470" cy="1150" rx="10" ry="8"/>
    </g>
  </g>

  <!-- face outline -->
  <path d="M1180,560 C992,560 852,694 838,952 C826,1166 906,1380 1066,1508 C1132,1562 1180,1582 1180,1582 C1180,1582 1264,1550 1334,1490 C1486,1356 1560,1150 1546,944 C1532,690 1368,560 1180,560 Z" fill="none" stroke="rgba(80,45,25,.4)" stroke-width="3"/>

  <!-- midline split indicator -->
  <line x1="1180" y1="566" x2="1180" y2="1576" stroke="rgba(255,255,255,.55)" stroke-width="3" stroke-dasharray="10 12"/>

  <!-- eyebrows -->
  <path d="M952,930 Q1030,902 1104,928" fill="none" stroke="#5b3b2e" stroke-width="11" stroke-linecap="round"/>
  <path d="M1262,930 Q1340,904 1410,936" fill="none" stroke="#4d3026" stroke-width="11" stroke-linecap="round"/>
  <!-- eyes -->
  <g>
    <path d="M956,986 Q1030,946 1100,986 Q1030,1026 956,986 Z" fill="#fff"/>
    <circle cx="1030" cy="986" r="26" fill="#6b4f2e"/><circle cx="1030" cy="986" r="12" fill="#1c130a"/>
    <circle cx="1022" cy="978" r="6" fill="#fff" opacity=".9"/>
    <path d="M956,986 Q1030,946 1100,986" fill="none" stroke="#3a261c" stroke-width="5" stroke-linecap="round"/>
    <path d="M1268,990 Q1340,952 1408,992 Q1340,1030 1268,990 Z" fill="#f4ece2"/>
    <circle cx="1340" cy="990" r="26" fill="#6b4f2e"/><circle cx="1340" cy="990" r="12" fill="#1c130a"/>
    <circle cx="1332" cy="982" r="6" fill="#fff" opacity=".85"/>
    <path d="M1268,990 Q1340,952 1408,992" fill="none" stroke="#3a261c" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- nose -->
  <path d="M1180,1000 C1172,1080 1156,1140 1142,1176 C1156,1196 1208,1196 1222,1176 C1210,1142 1196,1082 1188,1000" fill="none" stroke="rgba(110,60,35,.45)" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="1156" cy="1182" rx="12" ry="7" fill="rgba(90,50,30,.4)"/>
  <ellipse cx="1208" cy="1182" rx="12" ry="7" fill="rgba(90,50,30,.4)"/>
  <!-- lips -->
  <path d="M1086,1318 Q1180,1296 1278,1318 Q1230,1300 1180,1300 Q1130,1300 1086,1318 Z" fill="#C75D5B"/>
  <path d="M1086,1318 Q1180,1372 1278,1318 Q1180,1342 1086,1318 Z" fill="#A8413F"/>
  <path d="M1086,1318 Q1180,1330 1278,1318" fill="none" stroke="#7d2e2c" stroke-width="3"/>

  <!-- ===== PEEL-AWAY CROSS-SECTION on right cheek ===== -->
  <g>
    <!-- window cut showing layers -->
    <clipPath id="peelWin"><path d="M1452,1052 q120,-10 150,70 q40,150 -10,300 q-30,90 -150,86 q-40,-220 0,-460 Z"/></clipPath>
    <g clip-path="url(#peelWin)">
      <rect x="1430" y="1040" width="200" height="40" fill="#F3D2B6"/>                <!-- stratum/epidermis -->
      <rect x="1430" y="1040" width="200" height="40" fill="url(#melaninDamaged)" opacity=".4"/>
      <rect x="1430" y="1080" width="200" height="190" fill="url(#dermisBand)"/>          <!-- dermis -->
      <rect x="1430" y="1080" width="200" height="190" fill="url(#collagenDamaged)" opacity=".9"/>
      <path d="M1470,1110 q60,40 30,120" stroke="#C0392B" stroke-width="6" fill="none"/>   <!-- dilated capillary -->
      <path d="M1520,1120 q50,60 20,130" stroke="#C0392B" stroke-width="5" fill="none"/>
      <rect x="1430" y="1270" width="200" height="150" fill="url(#fatDamaged)"/>           <!-- fat -->
      <rect x="1430" y="1420" width="200" height="90" fill="url(#muscle)"/>                <!-- muscle -->
    </g>
    <path d="M1452,1052 q120,-10 150,70 q40,150 -10,300 q-30,90 -150,86 q-40,-220 0,-460 Z" fill="none" stroke="rgba(60,30,15,.5)" stroke-width="3"/>
    <!-- curled flap peeled to the right -->
    <path d="M1602,1122 q150,-40 250,40 q70,70 30,180 q-60,140 -210,150 q90,-110 70,-230 q-16,-100 -130,-120 Z"
          fill="url(#skinDamaged)" stroke="rgba(60,30,15,.5)" stroke-width="3"/>
    <path d="M1602,1122 q150,-40 250,40 q70,70 30,180 q-60,140 -210,150 q90,-110 70,-230 q-16,-100 -130,-120 Z"
          fill="url(#melaninDamaged)" opacity=".25"/>
    <!-- flap underside (dermis pink lip) -->
    <path d="M1602,1122 q60,8 96,70 q24,52 8,150 q-8,60 -64,140 q90,-110 70,-230 q-16,-100 -110,-120 Z" fill="#E78A8A" opacity=".85"/>
    <text x="1690" y="1300" class="ink b" font-size="26" transform="rotate(14 1690 1300)">skin flap</text>
  </g>
</g>

<!-- ============ CROSS-SECTION DIAGRAM ============ -->
<g>
  <rect x="120" y="1830" width="2240" height="1000" rx="36" fill="url(#panelG)" stroke="rgba(255,255,255,.08)" stroke-width="3"/>
  <text x="160" y="1910" class="ink b" font-size="50">SKIN LAYERS — CROSS SECTION</text>
  <text x="160" y="1958" class="muted" font-size="32">Left = healthy / treated&#160;&#160;·&#160;&#160;Right = sun-damaged</text>

  <!-- column headers over bands -->
  <text x="1075" y="1958" text-anchor="middle" class="heal b" font-size="34">HEALTHY</text>
  <text x="1685" y="1958" text-anchor="middle" class="dmg b" font-size="34">DAMAGED</text>
  <line x1="1380" y1="1990" x2="1380" y2="2760" stroke="rgba(255,255,255,.5)" stroke-width="3" stroke-dasharray="9 11"/>

  <!-- band geometry: x 770..1990 (split 1380); rows -->
  <!-- Row helper: each <g> = one layer -->

  <!-- 1 STRATUM CORNEUM  y 2000..2080 -->
  <g>
    <rect x="770" y="2000" width="610" height="80" fill="#F3D9C2"/>
    <rect x="770" y="2000" width="610" height="80" fill="url(#stratumHealthy)"/>
    <rect x="1380" y="2000" width="610" height="80" fill="#E4C09E"/>
    <rect x="1380" y="2000" width="610" height="80" fill="url(#stratumDamaged)"/>
    <rect x="770" y="2000" width="1220" height="80" fill="none" stroke="rgba(0,0,0,.25)" stroke-width="2"/>
    <!-- name + leader (left) -->
    <line x1="770" y1="2040" x2="700" y2="2040" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
    <text x="690" y="2034" text-anchor="end" class="ink b" font-size="34">STRATUM CORNEUM</text>
    <text x="690" y="2068" text-anchor="end" class="muted" font-size="25">Surface barrier</text>
    <!-- callouts right -->
    <g transform="translate(2030,2018)">
      <use xlink:href="#icoSun"/>
      <text x="58" y="22" class="dmg" font-size="27">UV thickens &amp; dehydrates the barrier</text>
      <use xlink:href="#icoSpark" y="38"/>
      <text x="58" y="60" class="heal" font-size="27">Ceramides + Hyaluronic Acid restore</text>
    </g>
  </g>

  <!-- 2 EPIDERMIS  y 2090..2210 -->
  <g>
    <rect x="770" y="2090" width="610" height="120" fill="#F1C9A6"/>
    <rect x="770" y="2090" width="610" height="120" fill="url(#melaninHealthy)" opacity=".9"/>
    <rect x="1380" y="2090" width="610" height="120" fill="#D9A877"/>
    <rect x="1380" y="2090" width="610" height="120" fill="url(#melaninDamaged)" opacity=".85"/>
    <rect x="770" y="2090" width="1220" height="120" fill="none" stroke="rgba(0,0,0,.25)" stroke-width="2"/>
    <line x1="770" y1="2150" x2="700" y2="2150" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
    <text x="690" y="2144" text-anchor="end" class="ink b" font-size="34">EPIDERMIS</text>
    <text x="690" y="2178" text-anchor="end" class="muted" font-size="25">Keratinocytes + melanin</text>
    <g transform="translate(2030,2108)">
      <use xlink:href="#icoSun"/>
      <text x="58" y="22" class="dmg" font-size="27">UV overproduces melanin &#8594; dark spots</text>
      <use xlink:href="#icoSpark" y="38"/>
      <text x="58" y="60" class="heal" font-size="27">SPF blocks UV · Niacinamide regulates melanin</text>
    </g>
  </g>

  <!-- 3 DERMAL-EPIDERMAL JUNCTION  y 2220..2280 -->
  <g>
    <rect x="770" y="2220" width="1220" height="60" fill="#EBB89A"/>
    <path d="M770,2250 q26,18 52,0 t52,0 t52,0 t52,0 t52,0 t52,0 t52,0 t52,0 t52,0 t52,0 t52,0" fill="none" stroke="#9c6b45" stroke-width="4"/>
    <path d="M1380,2250 q60,8 120,0 t120,0 t120,0 t120,0 t120,0" fill="none" stroke="#9c6b45" stroke-width="4" opacity=".7"/>
    <rect x="770" y="2220" width="1220" height="60" fill="none" stroke="rgba(0,0,0,.25)" stroke-width="2"/>
    <line x1="770" y1="2250" x2="700" y2="2250" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
    <text x="690" y="2244" text-anchor="end" class="ink b" font-size="30">DERMAL-EPIDERMAL JUNCTION</text>
    <text x="690" y="2274" text-anchor="end" class="muted" font-size="25">Rete ridges</text>
    <g transform="translate(2030,2226)">
      <use xlink:href="#icoSun"/>
      <text x="58" y="20" class="dmg" font-size="27">UV flattens rete ridges, weakens junction</text>
      <use xlink:href="#icoSpark" y="34"/>
      <text x="58" y="54" class="heal" font-size="27">Retinoids + Peptides reinforce</text>
    </g>
  </g>
